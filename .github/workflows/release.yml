name: Release

# Triggered by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
# Can also be triggered manually from the Actions tab (for testing)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  # ── Windows installer (MSI) ────────────────────────────────────────────────
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write       # needed to create the GitHub Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build fat JAR
        run: mvn package -DskipTests

      # ── Extract version (from tag v1.2.3 → 1.2.3, or manual input) ──────────
      - name: Extract version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      # ── Prepare a clean input directory for jpackage ───────────────────────
      # jpackage includes every JAR in --input on the classpath; keeping only
      # the fat JAR avoids bundling the leftover original-*.jar from shade.
      - name: Stage fat JAR for jpackage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force jpackage-input | Out-Null
          Copy-Item target\shufflingway.jar jpackage-input\

      # ── Create Windows MSI installer ───────────────────────────────────────
      - name: Run jpackage (MSI)
        shell: pwsh
        run: |
          jpackage `
            --input            jpackage-input `
            --name             Shufflingway `
            --app-version      ${{ steps.ver.outputs.version }} `
            --vendor           "RockefellerA" `
            --main-jar         shufflingway.jar `
            --main-class       shufflingway.MainWindow `
            --java-options     "--enable-native-access=ALL-UNNAMED" `
            --win-dir-chooser `
            --win-shortcut `
            --type             msi `
            --dest             target/dist

      # ── Publish GitHub Release with both artifacts ─────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/shufflingway.jar
            target/dist/*.msi
