name: Release

# Triggered by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
# Can also be triggered manually from the Actions tab (for testing)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  # ── Create the GitHub Release (both platform jobs upload into this) ────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true

  # ── Windows installer (MSI) ────────────────────────────────────────────────
  release-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./shufflingway

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set pom version
        shell: bash
        run: mvn versions:set -DnewVersion=${{ needs.create-release.outputs.version }} -DgenerateBackupPoms=false

      - name: Build fat JAR
        run: mvn package -DskipTests

      # jpackage includes every JAR in --input; keep only the fat JAR
      - name: Stage fat JAR for jpackage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force jpackage-input | Out-Null
          Copy-Item target\shufflingway.jar jpackage-input\

      - name: Convert icon PNG to ICO
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $png  = [System.Drawing.Image]::FromFile((Resolve-Path "src\main\resources\resources\shufflingway.png"))
          $bmp  = New-Object System.Drawing.Bitmap(256, 256)
          $g    = [System.Drawing.Graphics]::FromImage($bmp)
          $g.DrawImage($png, 0, 0, 256, 256)
          $g.Dispose()
          $hIcon = $bmp.GetHicon()
          $icon  = [System.Drawing.Icon]::FromHandle($hIcon)
          $fs    = [System.IO.FileStream]::new("Shufflingway.ico", [System.IO.FileMode]::Create)
          $icon.Save($fs)
          $fs.Close()
          $icon.Dispose(); $bmp.Dispose(); $png.Dispose()

      - name: Run jpackage (MSI)
        shell: pwsh
        run: |
          jpackage `
            --input            jpackage-input `
            --name             Shufflingway `
            --app-version      ${{ needs.create-release.outputs.version }} `
            --vendor           "RockefellerA" `
            --main-jar         shufflingway.jar `
            --main-class       shufflingway.MainWindow `
            --java-options     "--enable-native-access=ALL-UNNAMED" `
            --icon             Shufflingway.ico `
            --win-dir-chooser `
            --win-shortcut `
            --win-upgrade-uuid a3f8c4d2-7b9e-4f01-8c6a-2d5e9b03f7a1 `
            --type             msi `
            --dest             target/dist

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: shufflingway/target/dist/*.msi

  # ── macOS DMG ─────────────────────────────────────────────────────────────
  release-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./shufflingway

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set pom version
        run: mvn versions:set -DnewVersion=${{ needs.create-release.outputs.version }} -DgenerateBackupPoms=false

      - name: Build fat JAR
        run: mvn package -DskipTests

      # jpackage includes every JAR in --input; keep only the fat JAR
      - name: Stage fat JAR for jpackage
        run: |
          mkdir -p jpackage-input
          cp target/shufflingway.jar jpackage-input/

      - name: Convert icon PNG to ICNS
        run: |
          mkdir -p Shufflingway.iconset
          sips -z 16   16   src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_16x16.png
          sips -z 32   32   src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_16x16@2x.png
          sips -z 32   32   src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_32x32.png
          sips -z 64   64   src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_32x32@2x.png
          sips -z 128  128  src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_128x128.png
          sips -z 256  256  src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_128x128@2x.png
          sips -z 256  256  src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_256x256.png
          sips -z 512  512  src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_256x256@2x.png
          sips -z 512  512  src/main/resources/resources/shufflingway.png --out Shufflingway.iconset/icon_512x512.png
          iconutil -c icns Shufflingway.iconset

      - name: Run jpackage (DMG)
        run: |
          jpackage \
            --input            jpackage-input \
            --name             Shufflingway \
            --app-version      ${{ needs.create-release.outputs.version }} \
            --vendor           "RockefellerA" \
            --main-jar         shufflingway.jar \
            --main-class       shufflingway.MainWindow \
            --java-options     "--enable-native-access=ALL-UNNAMED" \
            --icon             Shufflingway.icns \
            --type             dmg \
            --dest             target/dist

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: shufflingway/target/dist/*.dmg
